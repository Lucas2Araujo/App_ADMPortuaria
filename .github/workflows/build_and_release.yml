name: Compilar Executáveis e Criar Nova Release

# Disparado APENAS manualmente através do botão "Run workflow" na aba Actions
on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag da Versão (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Título da Release (ex: Sprint 1 - Versão Final)'
        required: true
        default: 'Sprint 1 - Versão Final'

jobs:
  build:
    name: Compilar Executáveis
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: Adm_Porto
          - os: windows-latest
            artifact_name: Adm_Porto.exe

    steps:
      - name: 📥 Clonar o Repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências e PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: 🔨 Compilar com PyInstaller
        run: pyinstaller --onefile --name ${{ matrix.artifact_name }} src/app.py

      - name: 📤 Guardar Binário Temporariamente
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  create_release:
    name: Criar Release Oficial e Analisar Segurança
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Baixar Binários Compilados
        uses: actions/download-artifact@v4
        with:
          path: binarios/

      - name: 🔐 Gerar Hashes SHA-256 e Organizar Arquivos
        run: |
          cd binarios
          mv Adm_Porto/Adm_Porto .
          mv Adm_Porto.exe/Adm_Porto.exe .
          sha256sum Adm_Porto Adm_Porto.exe > checksums_oficiais.txt
          cat checksums_oficiais.txt

      - name: 🦠 Analisar no VirusTotal
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            binarios/Adm_Porto
            binarios/Adm_Porto.exe

      - name: 🚀 Criar Nova Release e Fazer Upload dos Arquivos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd binarios
          gh release create "${{ github.event.inputs.tag_name }}" \
            Adm_Porto \
            Adm_Porto.exe \
            checksums_oficiais.txt \
            --title "${{ github.event.inputs.release_title }}" \
            --notes "Release gerada de forma 100% automatizada via GitHub Actions. Os executáveis foram compilados em ambientes limpos e verificados criptograficamente." \
            --repo ${{ github.repository }}
